<!DOCTYPE html>
<html lang="lv" data-theme="light">
<head>
  <title>Rēzeknes ielu tīrības karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  
  <script src="https://www.paypal.com/sdk/js?client-id=Ac88Ac73001nBi9ELLacJvk0N3hanPsPvwqtF-3xyBdIr7qUPWnWyRi98sINCUBXXpwY8eIQMWL2m1ut&currency=EUR"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <style>
    :root {
      --bg-panel: rgba(255, 255, 255, 0.9);
      --text-main: #1c1c1e;
      --accent: #007AFF;
      --border: rgba(0, 0, 0, 0.08);
      --input-bg: rgba(0, 0, 0, 0.04);
      --shadow: 0 8px 32px rgba(0,0,0,0.12);
    }
    [data-theme="dark"] {
      --bg-panel: rgba(28, 28, 30, 0.8);
      --text-main: #ffffff;
      --accent: #0A84FF;
      --border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
      --shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    body { margin: 0; padding: 0; overflow: hidden; font-family: 'Inter', sans-serif; background: #000; }
    #map { height: 100vh; width: 100vw; z-index: 1; }

    /* UI Components */
    .auth-nav { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
    .auth-btn { background: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-weight: 600; backdrop-filter: blur(10px); box-shadow: var(--shadow); transition: 0.2s; }
    
    #user-tag:not([disabled]) { border-color: var(--accent); cursor: pointer; }
    #user-tag:not([disabled]):hover { background: var(--input-bg); }

    .theme-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 14px; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow); font-size: 1.2rem; }

    /* Modals */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .modal-card { background: var(--bg-panel); padding: 30px; border-radius: 24px; color: var(--text-main); border: 1px solid var(--border); box-shadow: var(--shadow); width: 320px; }
    .modal-card input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text-main); box-sizing: border-box; }
    
    /* Google Button Styling */
    .google-btn { background: #fff; color: #757575; border: 1px solid #ddd; padding: 10px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }

    /* Control Panel FIXES */
    .control-panel { 
      position: absolute; 
      z-index: 1000; 
      background: var(--bg-panel); 
      backdrop-filter: blur(20px); 
      border: 1px solid var(--border); 
      box-shadow: var(--shadow); 
      color: var(--text-main); 
      display: flex; 
      flex-direction: column; 
      max-height: 85vh; /* Prevents panel from going off-screen */
    }
    
    @media (min-width: 601px) { .control-panel { bottom: 30px; left: 30px; width: 340px; border-radius: 24px; padding: 24px; } }
    @media (max-width: 600px) { .control-panel { bottom: 20px; left: 5%; right: 5%; width: 90%; border-radius: 28px; padding: 20px; box-sizing: border-box; } }

    .panel-content { 
      overflow-y: auto; /* Makes the content (PayPal) scrollable */
      flex: 1; 
      padding-right: 5px;
      -webkit-overflow-scrolling: touch; /* Smooth scrolling for mobile */
    }

    .option-card { display: flex; align-items: center; padding: 14px; margin: 6px 0; background: var(--input-bg); border-radius: 16px; }
    .btn-apply { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; flex-shrink: 0; }
    
    #paypal-button-container { margin-top: 15px; min-height: 150px; }

    /* Map Controls & Others */
    .map-controls { position: absolute; top: 80px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
    .search-box { position: relative; width: 250px; }
    #streetSearch { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-panel); color: var(--text-main); backdrop-filter: blur(10px); box-shadow: var(--shadow); box-sizing: border-box; }
    .search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-panel); border-radius: 12px; margin-top: 5px; max-height: 200px; overflow-y: auto; display: none; box-shadow: var(--shadow); z-index: 1001; }
    .search-item { padding: 10px 15px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; color: var(--text-main); }
    .control-btn { width: 44px; height: 44px; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
  </style>
</head>
<body>

<div class="auth-nav">
  <div id="logged-out-ui">
    <button class="auth-btn" onclick="openAuth('login')">Pieteikties</button>
    <button class="auth-btn" onclick="openAuth('register')">Reģistrēties</button>
  </div>
  <div id="logged-in-ui" style="display:none;">
    <button class="auth-btn" id="user-tag" onclick="openSettings()">Ielādē...</button>
    <button class="auth-btn" onclick="handleLogout()">Iziet</button>
    <button class="auth-btn" id="admin-panel-btn" style="display:none; background:#FF3B30; color:white;" onclick="openAdminDashboard()">Admin ⚙️</button>
  </div>
</div>

<div class="map-controls">
  <div class="search-box">
    <input type="text" id="streetSearch" placeholder="Meklēt ielu Rēzeknē..." oninput="handleSearch()">
    <div id="search-results" class="search-results"></div>
  </div>
  <button class="control-btn" onclick="findMyLocation()" title="Mana atrašanās vieta">📍</button>
</div>

<button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
<div id="map"></div>

<div class="modal-overlay" id="auth-modal">
  <div class="modal-card">
    <h2 id="modal-title">Pieteikties</h2>
    <input type="email" id="email" placeholder="E-pasts">
    <input type="password" id="password" placeholder="Parole">
    <div id="reg-fields" style="display:none;">
      <input type="text" id="username" placeholder="Lietotājvārds">
      <input type="date" id="dob" title="Dzimšanas datums">
    </div>
    <button class="btn-apply" onclick="submitAuth()">Apstiprināt</button>
    
    <button class="google-btn" onclick="signInWithGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" height="18"> 
      Turpināt ar Google
    </button>

    <button onclick="closeAuth()" style="margin-top:10px; width:100%; background:none; border:none; color:var(--text-main); opacity:0.5; cursor:pointer;">Atcelt</button>
  </div>
</div>

<div class="control-panel" id="panel" style="display:none;">
  <h2>Ielas Statuss</h2>
  <div class="panel-content">
    <label class="option-card"><input type="checkbox" id="carsCheck"> <span style="margin-left:10px;">🚗 Netīrs braucējiem</span></label>
    <div id="pedSection" style="opacity:0.5; border-top:1px solid var(--border); margin-top:15px; padding-top:15px;">
      <label class="option-card"><input type="checkbox" id="pedCheck" disabled> <span style="margin-left:10px;">🚶 Netīrs gājējiem</span></label>
      <div id="pay-notice">
        <p style="font-size: 0.75rem; text-align: center;">Premium funkcija: 0.67€</p>
        <div id="paypal-button-container"></div>
      </div>
    </div>
  </div>
  <button onclick="applyStatus()" class="btn-apply">Saglabāt</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyA0dMTX1y7CYZBLyd4lgQDkR8nJ7utRvIc",
  authDomain: "rezekne-app.firebaseapp.com",
  databaseURL: "https://rezekne-app-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rezekne-app",
  storageBucket: "rezekne-app.firebasestorage.app",
  messagingSenderId: "364360316305",
  appId: "1:364360316305:web:d75b3b082c0cb8ef819630"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

let userProfile = null;
let streetStates = {};
let streetLayersById = {};
let selectedLayer = null;
let isPedestrianUnlocked = false;

// --- AUTH ---
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const snapshot = await database.ref('users/' + user.uid).once('value');
    userProfile = snapshot.val();
    document.getElementById('logged-out-ui').style.display = 'none';
    document.getElementById('logged-in-ui').style.display = 'block';
    document.getElementById('user-tag').innerText = userProfile?.username || user.displayName || "Lietotājs";
    if (userProfile?.role === 'admin') document.getElementById('admin-panel-btn').style.display = 'block';
    if (userProfile?.isPremium) unlockPedestrianFeature();
  }
});

async function signInWithGoogle() {
  try {
    const result = await auth.signInWithPopup(googleProvider);
    const user = result.user;
    const snapshot = await database.ref('users/' + user.uid).once('value');
    if (!snapshot.exists()) {
      await database.ref('users/' + user.uid).set({
        username: user.displayName,
        role: 'user',
        isPremium: false
      });
    }
    closeAuth();
  } catch (error) { alert("Google kļūda: " + error.message); }
}

// --- PAYPAL ---
paypal.Buttons({
  createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '0.67', currency_code: 'EUR' } }] }),
  onApprove: (data, actions) => actions.order.capture().then(() => {
    if (auth.currentUser) database.ref('users/' + auth.currentUser.uid).update({ isPremium: true });
    unlockPedestrianFeature();
  })
}).render('#paypal-button-container');

function unlockPedestrianFeature() {
  isPedestrianUnlocked = true;
  document.getElementById("pedCheck").disabled = false;
  document.getElementById("pay-notice").style.display = "none";
  document.getElementById("pedSection").style.opacity = "1";
}

// --- MAP LOGIC (Condensed for brevity) ---
const map = L.map('map', { zoomControl: false }).setView([56.5100, 27.3400], 14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

async function loadStreets() {
  const query = `[out:json][timeout:25];(way["highway"~"trunk|primary|secondary|tertiary|residential"](56.45,27.25,56.55,27.42););out geom;`;
  const res = await fetch("https://overpass-api.de/api/interpreter", { method: "POST", body: query });
  const data = await res.json();
  
  L.geoJSON(data.elements.map(el => ({
    type: "Feature", geometry: { type: "LineString", coordinates: el.geometry.map(g => [g.lon, g.lat]) },
    properties: { id: el.id, name: el.tags?.name }
  })), {
    style: { color: "#94a3b8", weight: 6, opacity: 0.8 },
    onEachFeature: (f, layer) => {
      streetLayersById[f.properties.id] = layer;
      layer.on("click", () => {
        selectedLayer = layer;
        document.getElementById("panel").style.display = "flex";
      });
    }
  }).addTo(map);
}

function openAuth(m) { document.getElementById('auth-modal').style.display='flex'; }
function closeAuth() { document.getElementById('auth-modal').style.display='none'; }
function applyStatus() { /* logic to save to firebase */ document.getElementById("panel").style.display = "none"; }
function handleLogout() { auth.signOut().then(() => location.reload()); }

loadStreets();
</script>
</body>
</html>
