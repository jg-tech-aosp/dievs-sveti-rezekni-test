<!DOCTYPE html>
<html>
<head>
  <title>Rēzeknes ielu tīrības karte</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://www.paypal.com/sdk/js?client-id=Ac88Ac73001nBi9ELLacJvk0N3hanPsPvwqtF-3xyBdIr7qUPWnWyRi98sINCUBXXpwY8eIQMWL2m1ut&currency=EUR"></script>
  
  <style>
    body { margin: 0; padding: 0; overflow: hidden; }
    #map { height: 100vh; width: 100vw; }
    path.leaflet-interactive {
  outline: none;
  /* Helps mobile browsers understand these are tappable */
  cursor: pointer;
}
    /* DEFAULT DESKTOP PANEL */
    .control-panel {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      z-index: 1000;
      width: 300px;
      max-height: 80vh; 
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    /* MOBILE ADJUSTMENTS */
    @media (max-width: 600px) {
      .control-panel {
        width: 100%;
        left: 0;
        bottom: 0;
        border-radius: 20px 20px 0 0; /* Rounded top for mobile drawer look */
        padding: 20px;
        max-height: 50vh; /* Only covers bottom half of screen */
        overflow-y: auto;
      }

      /* Make tap targets bigger for fingers */
      button {
        padding: 12px !important;
        font-size: 16px !important;
      }
      
      input[type="checkbox"] {
        transform: scale(1.3);
        margin-right: 10px;
      }
    }

    .disabled-feature {
      color: #888;
      font-size: 0.9em;
      margin-top: 10px;
      border-top: 1px solid #eee;
      padding-top: 10px;
    }

    #paypal-button-container {
      margin-top: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    .admin-reset {
      font-size: 10px;
      color: #ccc;
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 15px;
      text-align: center;
      padding: 10px;
    }

    .promo-container {
      margin-top: 10px;
      display: flex;
      gap: 5px;
    }
    .promo-container input {
      flex: 1;
      padding: 8px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="control-panel" id="panel" style="display:none;">
  <strong>Ielu Statuss</strong><br>
  <label style="display: block; padding: 10px 0;">
    <input type="checkbox" id="carsCheck"> Netīrs braucējiem
  </label>
  
  <div id="pedSection" class="disabled-feature">
    <label style="display: block; padding: 10px 0;">
      <input type="checkbox" id="pedCheck" disabled> Netīrs gājējiem
    </label>
    
    <div id="pay-notice">
      <div class="promo-container">
        <input type="text" id="promoInput" placeholder="Slepenais kods?">
        <button onclick="checkPromo()">Go</button>
      </div>

      <p style="margin: 10px 0;">💰 Maksājiet 0.67 EUR gājēju funkcijai.</p>
      <div id="paypal-button-container"></div>
    </div>
  </div>

  <button onclick="applyStatus()" style="margin-top:10px; width: 100%; background: #007bff; color: white; border: none; border-radius: 5px;">Apstiprināt</button>
  <button onclick="relock()" class="admin-reset">Admin: Reset Purchase</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Map optimized for touch
const map = L.map('map', {
  tap: true, 
  zoomControl: false // Hide zoom buttons on mobile to clear screen
}).setView([56.5100, 27.3400], 14);

// Add zoom control back to top right for desktop
L.control.zoom({ position: 'topright' }).addTo(map);

let isPedestrianUnlocked = false; 

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let streetLayer;
let selectedLayer = null;
let streetStates = {};
let streetLayersById = {};

if (localStorage.getItem('pedestrian_unlocked') === 'true') {
  setTimeout(unlockPedestrianFeature, 100);
}

function checkPromo() {
  const code = document.getElementById("promoInput").value;
  if (code === "BURGER67") {
    alert("Code accepted! Features unlocked.");
    unlockPedestrianFeature();
  } else {
    alert("Wrong code. Pay up!");
  }
}

paypal.Buttons({
  createOrder: (data, actions) => {
    return actions.order.create({
      purchase_units: [{
        amount: { value: '0.67', currency_code: 'EUR' }
      }]
    });
  },
  onApprove: (data, actions) => {
    return actions.order.capture().then(details => {
      alert('Payment Successful! Feature permanently unlocked.');
      unlockPedestrianFeature();
    });
  }
}).render('#paypal-button-container');

function unlockPedestrianFeature() {
  isPedestrianUnlocked = true;
  localStorage.setItem('pedestrian_unlocked', 'true');
  
  const pedCheck = document.getElementById("pedCheck");
  const payNotice = document.getElementById("pay-notice");
  const pedSection = document.getElementById("pedSection");

  if (pedCheck) pedCheck.disabled = false;
  if (payNotice) payNotice.style.display = "none";
  if (pedSection) pedSection.classList.remove("disabled-feature");
}

function relock() {
  const confirmation = confirm("⚠️ WARNING: This will lock the Pedestrian reporting feature.");
  if (confirmation) {
    localStorage.removeItem('pedestrian_unlocked');
    location.reload();
  }
}

function getColor(state) {
  if (!state) return "#3388ff";
  if (state.cars && state.ped) return "red";
  if (state.cars) return "yellow";
  if (state.ped) return "purple";
  return "#3388ff";
}

async function loadStreets() {
  const query = `[out:json][timeout:25];(way["highway"~"trunk|primary|secondary|tertiary|residential|unclassified|living_street"](56.45,27.25,56.55,27.42););out geom;`;
  try {
    const response = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });
    const data = await response.json();
    const geojson = {
      type: "FeatureCollection",
      features: data.elements.map(el => ({
        type: "Feature",
        geometry: {
          type: "LineString",
          coordinates: el.geometry.map(g => [g.lon, g.lat])
        },
        properties: { id: el.id }
      }))
    };

    streetLayer = L.geoJSON(geojson, {
      style: feature => {
        const state = streetStates[feature.properties.id];
        return { color: getColor(state), weight: 5 };
      },
      onEachFeature: (feature, layer) => {
        const id = feature.properties.id;
        streetLayersById[id] = layer;
        layer.on("click", () => {
          selectedLayer = layer;
          const state = streetStates[id] || { cars:false, ped:false };
          document.getElementById("carsCheck").checked = state.cars;
          if (isPedestrianUnlocked) {
            document.getElementById("pedCheck").checked = state.ped;
          }
          document.getElementById("panel").style.display = "block";
        });
      }
    }).addTo(map);
  } catch (e) { console.error("Map load failed", e); }
}

function applyStatus() {
  if (!selectedLayer) return;
  const id = selectedLayer.feature.properties.id;

  streetStates[id] = {
    cars: document.getElementById("carsCheck").checked,
    ped: isPedestrianUnlocked ? document.getElementById("pedCheck").checked : (streetStates[id]?.ped || false)
  };

  selectedLayer.setStyle({
    color: getColor(streetStates[id]),
    weight: 5
  });

  document.getElementById("panel").style.display = "none";
}

loadStreets();
streetLayer = L.geoJSON(geojson, {
  style: feature => {
    const state = streetStates[feature.properties.id];
    return { 
      color: getColor(state), 
      weight: 8,         // Increased from 5 to 8 for easier tapping
      opacity: 0.6,      // Slightly transparent makes it look cleaner
      lineJoin: 'round'  // Makes corners smoother for touch
    };
  },
  onEachFeature: (feature, layer) => {
    const id = feature.properties.id;
    streetLayersById[id] = layer;

    // Visual feedback for touch
    layer.on("mousedown touchstart", () => {
      layer.setStyle({ weight: 12, opacity: 1 }); // Briefly thickens when touched
    });

    layer.on("click", () => {
      selectedLayer = layer;
      const state = streetStates[id] || { cars:false, ped:false };
      document.getElementById("carsCheck").checked = state.cars;
      if (isPedestrianUnlocked) {
        document.getElementById("pedCheck").checked = state.ped;
      }
      document.getElementById("panel").style.display = "block";
      
      // Reset style after selection
      layer.setStyle({ weight: 8, opacity: 0.8 });
    });
  }
}).addTo(map);
</script>
</body>
</html>
